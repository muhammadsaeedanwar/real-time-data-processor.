name: C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build
      run: g++ -std=c++17 -O2 -pthread realtime_data_processing.cpp -o realtime
    - name: Run Test
      run: ./realtime & sleep 3; kill $!
